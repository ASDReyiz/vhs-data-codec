name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ─── Windows ── builds the .exe installer ────────────────────────────────
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Convert PNG icon to ICO
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing
          $png = [System.Drawing.Image]::FromFile("$PWD\electron\icon.png")
          $bitmap = New-Object System.Drawing.Bitmap(256, 256)
          $g = [System.Drawing.Graphics]::FromImage($bitmap)
          $g.DrawImage($png, 0, 0, 256, 256)
          $g.Dispose()
          $ico_path = "$PWD\electron\icon.ico"
          $stream = [System.IO.File]::OpenWrite($ico_path)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $writer.Write([uint16]0)
          $writer.Write([uint16]1)
          $writer.Write([uint16]1)
          $writer.Write([byte]0)
          $writer.Write([byte]0)
          $writer.Write([byte]0)
          $writer.Write([byte]0)
          $writer.Write([uint16]1)
          $writer.Write([uint16]32)
          $ms = New-Object System.IO.MemoryStream
          $bitmap.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
          $imgBytes = $ms.ToArray()
          $writer.Write([uint32]$imgBytes.Length)
          $writer.Write([uint32]22)
          $writer.Write($imgBytes)
          $writer.Close()
          $stream.Close()
          Write-Host "ICO created at $ico_path"

      - name: Install dependencies
        run: npm install

      - name: Build (Vite + electron-builder)
        run: npm run build:electron -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe
          retention-days: 7

  # ─── Linux ── builds the AppImage ────────────────────────────────────────
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install dependencies
        run: npm install

      - name: Build (Vite + electron-builder)
        run: npm run build:electron -- --linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
          retention-days: 7

  # ─── Release ── attaches both builds to the GitHub Release ───────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
